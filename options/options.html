<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="options-container">
    <h1>Settings</h1>
    
    <section>
      <h2>GitHub Token</h2>
      <div class="form-group">
        <label>Personal Access Token</label>
        <div class="token-group">
          <input type="password" id="token" placeholder="ghp_..." />
          <button id="toggle">👁️</button>
        </div>
        <p class="help"><a href="https://github.com/settings/tokens/new" target="_blank">Create token</a> with `user` scope</p>
      </div>
      <button id="verify">Verify Token</button>
      <div id="status"></div>
    </section>

    <section>
      <h2>Display</h2>
      <div class="form-group">
        <label>Refresh Interval (minutes)</label>
        <input type="number" id="interval" min="1" max="60" value="5" />
      </div>
    </section>

    <button id="save" class="primary">Save Changes</button>
    <button id="reset" class="secondary">Reset</button>
  </div>
  <script src="options.js"></script>
</body>
</html>
